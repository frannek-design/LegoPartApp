<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGO Onderdelen Catalogus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .modal-content {
      position: relative;
      background-color: #1f2937;
      margin: 10% auto;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 1px solid #4b5563;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    .file-input-button {
        cursor: pointer;
    }
  </style>
</head>
<body class="bg-gray-900 min-h-screen p-4 sm:p-8">
  <div id="root" class="max-w-3xl mx-auto bg-gray-800 rounded-2xl shadow-xl overflow-hidden p-6 sm:p-8">
    
    <!-- Hoofdmenu -->
    <div id="main-menu">
        <img src="lego-logo.png" alt="LEGO Logo" class="w-48 mx-auto mb-6">
        <h1 class="text-3xl sm:text-4xl font-extrabold mb-8 text-center text-yellow-400">LEGO® Part Finder</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Tegel 1: Zoeken -->
            <button id="show-search-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-8 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-yellow-400 h-full">
                <div class="flex flex-col items-center justify-center h-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <span class="text-2xl">Zoek via foto of nummer</span>
                </div>
            </button>
            <!-- Tegel 2: Bestellijst -->
            <button id="show-order-list-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-8 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-green-400 h-full">
                <div class="flex flex-col items-center justify-center h-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    <span class="text-2xl">Bestellijst</span>
                </div>
            </button>
            <!-- Tegel 3: Bladeren -->
            <button id="show-browse-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-8 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-400 h-full">
                <div class="flex flex-col items-center justify-center h-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    <span class="text-2xl">Blader door Categorieën</span>

    <!-- Zoek Sectie -->
    <div id="search-section" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <button class="back-button bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Terug naar menu
            </button>
            <button id="go-to-order-list-btn" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-lg flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                Naar Bestellijst
            </button>
        </div>
        <div id="confirmation-message" class="hidden fixed top-5 right-5 bg-green-500 text-white py-2 px-4 rounded-lg shadow-lg z-50"></div>
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-white mb-4">Zoek onderdeel via foto</h2>
            <label for="image-upload-input" class="file-input-button w-full text-center block bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-500 transition-colors">Upload of maak een foto</label>
            <input type="file" id="image-upload-input" class="hidden" accept="image/*" capture="environment">
        </div>
        <div id="image-search-result" class="mb-8"></div>
        <hr class="border-gray-600 my-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-white mb-4">Of zoek op nummer of naam</h2>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="part-search-input" placeholder="Voer een onderdeelnummer of naam in" class="flex-grow bg-gray-700 text-white placeholder-gray-400 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                <button type="button" id="text-search-btn" class="bg-yellow-500 text-gray-900 font-bold py-3 px-4 sm:px-6 rounded-lg hover:bg-yellow-400 transition-colors">Zoek</button>
            </div>
        </div>
        <div id="text-search-results" class="mb-4 space-y-2"></div>
        <div id="search-result" class="mb-8"></div>
    </div>

    <!-- Bestellijst Sectie -->
    <div id="order-list-section" class="hidden">
        <button class="back-button mb-6 bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            Terug naar menu
        </button>
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-white">Mijn Bestellijst</h2>
            <div class="flex gap-2">
                <button id="share-order-list-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg text-sm">Deel Lijst</button>
                <button id="clear-order-list-btn" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded-lg text-sm">Wis hele lijst</button>
            </div>
        </div>
        <div id="order-list-container" class="space-y-4"></div>
        <button id="add-to-order-list-btn" class="mt-6 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-lg">Voeg onderdeel toe</button>
    </div>

    <!-- Blader Sectie -->
    <div id="browse-section" class="hidden">
         <div class="flex justify-between items-center mb-6">
            <button class="back-button bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Terug naar menu
            </button>
            <button id="collapse-all-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg flex items-center">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11l7-7 7 7M5 19l7-7 7 7" /></svg>
                Alles sluiten
            </button>
        </div>
        <h2 class="text-2xl font-bold text-white mb-4">Blader door Categorieën</h2>
        <div id="app-container" class="space-y-4"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="absolute top-4 right-6 text-2xl font-bold text-gray-400 cursor-pointer hover:text-white" onclick="closeModal()">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="shareModal" class="modal">
    <div class="modal-content">
      <span class="absolute top-4 right-6 text-2xl font-bold text-gray-400 cursor-pointer hover:text-white" onclick="closeShareModal()">&times;</span>
      <h2 class="text-2xl font-bold text-white mb-4">Kopieer je bestellijst</h2>
      <p class="text-gray-400 mb-4">Kopiëren naar klembord is mislukt. Selecteer en kopieer de onderstaande tekst handmatig.</p>
      <textarea id="share-text-area" class="w-full h-48 bg-gray-900 text-white p-2 rounded-lg border border-gray-600"></textarea>
    </div>
  </div>

  <script>
    const mainMenu = document.getElementById('main-menu');
    const searchSection = document.getElementById('search-section');
    const browseSection = document.getElementById('browse-section');
    const orderListSection = document.getElementById('order-list-section');
    const appContainer = document.getElementById('app-container');
    const imageModal = document.getElementById('imageModal');
    const modalBody = document.getElementById('modal-body');
    const shareModal = document.getElementById('shareModal');
    const shareTextArea = document.getElementById('share-text-area');
    const searchInput = document.getElementById('part-search-input');
    const textSearchBtn = document.getElementById('text-search-btn');
    const textSearchResultsContainer = document.getElementById('text-search-results');
    const searchResultContainer = document.getElementById('search-result');
    const imageUploadInput = document.getElementById('image-upload-input');
    const imageSearchResultContainer = document.getElementById('image-search-result');
    const orderListContainer = document.getElementById('order-list-container');
    const confirmationMessage = document.getElementById('confirmation-message');
    
    const REBRICKABLE_API_KEY = '16904943652c1bc07ef5709e6b6dcbe5';
    let googleApiKey = "AIzaSyDAdvrApo-i8HtM6Rzbsn8cTsDoY9AQ0Vg"; 
    let searchCache = {};
    let allParts = [];
    let isPartsDataLoaded = false;

    // --- Navigatie ---
    const showSearchBtn = document.getElementById('show-search-btn');
    const showBrowseBtn = document.getElementById('show-browse-btn');
    const showOrderListBtn = document.getElementById('show-order-list-btn');
    const backButtons = document.querySelectorAll('.back-button');
    const addToOrderListBtn = document.getElementById('add-to-order-list-btn');
    const clearOrderListBtn = document.getElementById('clear-order-list-btn');
    const goToOrderListBtn = document.getElementById('go-to-order-list-btn');
    const shareOrderListBtn = document.getElementById('share-order-list-btn');
    const collapseAllBtn = document.getElementById('collapse-all-btn');

    function showSection(sectionId) {
        mainMenu.classList.add('hidden');
        searchSection.classList.add('hidden');
        browseSection.classList.add('hidden');
        orderListSection.classList.add('hidden');
        document.getElementById(sectionId).classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    showSearchBtn.addEventListener('click', () => showSection('search-section'));
    addToOrderListBtn.addEventListener('click', () => showSection('search-section'));
    showBrowseBtn.addEventListener('click', () => {
        showSection('browse-section');
        if (appContainer.innerHTML.trim() === '') {
            fetchCategories();
        }
    });
    showOrderListBtn.addEventListener('click', () => {
        renderOrderList();
        showSection('order-list-section');
    });
    goToOrderListBtn.addEventListener('click', () => {
        renderOrderList();
        showSection('order-list-section');
    });
    backButtons.forEach(button => {
        button.addEventListener('click', () => showSection('main-menu'));
    });
    clearOrderListBtn.addEventListener('click', () => {
        clearOrderList();
    });
    shareOrderListBtn.addEventListener('click', () => {
        shareOrderList();
    });
    collapseAllBtn.addEventListener('click', () => {
        const openLists = appContainer.querySelectorAll('ul:not(.hidden), div.pl-4:not(.hidden)');
        openLists.forEach(list => list.classList.add('hidden'));
        const openIcons = appContainer.querySelectorAll('svg.rotate-180');
        openIcons.forEach(icon => icon.classList.remove('rotate-180'));
    });

    // --- Bestellijst Functies ---
    const getOrderList = () => JSON.parse(localStorage.getItem('legoOrderList')) || [];
    const saveOrderList = (list) => localStorage.setItem('legoOrderList', JSON.stringify(list));

    function clearOrderList() {
        localStorage.removeItem('legoOrderList');
        renderOrderList();
    }

    function showConfirmation(message) {
        confirmationMessage.textContent = message;
        confirmationMessage.classList.remove('hidden');
        setTimeout(() => {
            confirmationMessage.classList.add('hidden');
        }, 2000);
    }

    function addToOrderList(partData) {
        let list = getOrderList();
        const newItem = {
            ...partData,
            id: 'item-' + Date.now() + Math.random(), // Unieke ID
            quantity: 1,
            color: 'any'
        };
        list.push(newItem);
        saveOrderList(list);
        showConfirmation(`${newItem.name} toegevoegd!`);
    }
    
    function handleAddToOrderList(partNum, isModal) {
        const partData = searchCache[partNum];
        if (partData) {
            addToOrderList(partData);
            if (isModal) {
                closeModal();
            } else {
                document.getElementById('root').scrollIntoView({ behavior: 'smooth' });
            }
        }
    }

    function removeFromOrderList(id) {
        let list = getOrderList();
        list = list.filter(p => p.id !== id);
        saveOrderList(list);
        renderOrderList();
    }

    function updateOrderItem(id, field, value) {
        let list = getOrderList();
        const itemIndex = list.findIndex(p => p.id === id);
        if (itemIndex > -1) {
            list[itemIndex][field] = field === 'quantity' ? parseInt(value, 10) : value;
            saveOrderList(list);
        }
    }

    async function shareOrderList() {
        const list = getOrderList();
        if (list.length === 0) return;

        let shareText = "Mijn LEGO Bestellijst:\n\n";
        list.forEach(part => {
            const colorText = part.color === 'any' ? 'N.v.t.' : part.color;
            shareText += `- ${part.quantity}x ${part.name} (#${part.part_num}) - Kleur: ${colorText}\n`;
        });

        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Mijn LEGO Bestellijst',
                    text: shareText,
                });
            } catch (error) {
                console.log('Fout bij delen via Web Share API:', error);
            }
        } else {
            try {
                await navigator.clipboard.writeText(shareText);
                showConfirmation('Bestellijst gekopieerd!');
            } catch (err) {
                console.error('Clipboard API mislukt, toon fallback modal:', err);
                shareTextArea.value = shareText;
                shareModal.style.display = 'block';
            }
        }
    }

        "Purple": {"Solid": ["Dark Purple", "Purple", "Medium Lavender", "Lavender"],"Transparent": ["Trans-Purple"],"Glitter": ["Trans-Purple Sparkle"],"Satin": ["Satin Trans-Purple"]},
        "Brown & Sand": {"Solid": ["Reddish Brown", "Dark Brown", "Brown", "Dark Tan", "Tan", "Nougat", "Medium Nougat", "Dark Nougat"]},
        "Gray": {"Solid": ["Dark Bluish Gray", "Light Bluish Gray", "Very Light Bluish Gray"],"Pearl": ["Pearl Dark Gray", "Pearl Light Gray", "Pearl Very Light Gray"],"Metallic": ["Metallic Dark Grey"]},
        "White": {"Solid": ["White"],"Pearl": ["Pearl White"],"Milky (Opal)": ["Trans-White (Opal)"]},
        "Black": {"Solid": ["Black"],"Transparent": ["Trans-Black"],"Satin": ["Satin Trans-Black"],"Chrome": ["Chrome Black"],"Speckled": ["Marbled Black/White", "Speckled Black/Silver", "Speckled Black/Gold"]},
        "Metallic": {"Pearl": ["Pearl Gold", "Pearl Light Gold"],"Chrome": ["Chrome Gold", "Chrome Silver", "Chrome Antique Brass"],"Metallic": ["Metallic Gold", "Metallic Silver", "Metallic Copper"]},
        "Colorless": {"Transparent": ["Trans-Clear"],"Glitter": ["Trans-Clear Sparkle"],"Satin": ["Satin Trans-Clear"]}
    };
    
    function findColorGroup(colorName) {
        for (co
