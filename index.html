<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGO Parts Categories</title>
  <!-- Laad Tailwind CSS vanaf een CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Laad de Inter-font voor een modern uiterlijk -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .modal-content {
      position: relative;
      background-color: #1f2937;
      margin: 10% auto;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 1px solid #4b5563;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    /* Stijl voor de file-input knop */
    .file-input-button {
        cursor: pointer;
    }
  </style>
</head>
<body class="bg-gray-900 min-h-screen p-4 sm:p-8">
  <div id="root" class="max-w-3xl mx-auto bg-gray-800 rounded-2xl shadow-xl overflow-hidden p-6 sm:p-8">
    <h1 class="text-3xl sm:text-4xl font-extrabold mb-6 text-center text-yellow-400">LEGO Onderdelen Catalogus</h1>
    
    <!-- Zoekformulier op nummer -->
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-white mb-4">Zoek onderdeel op nummer</h2>
        <form id="search-form" class="flex flex-col sm:flex-row gap-2">
            <input type="text" id="part-number-input" placeholder="Voer onderdeelnummer in (bijv. 3005)" class="flex-grow bg-gray-700 text-white placeholder-gray-400 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            <button type="submit" class="bg-yellow-500 text-gray-900 font-bold py-3 px-4 sm:px-6 rounded-lg hover:bg-yellow-400 transition-colors">Zoek</button>
        </form>
    </div>
    <div id="search-result" class="mb-8"></div>

    <!-- Zoekformulier op foto -->
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-white mb-4">Of zoek op foto</h2>
        <label for="image-upload-input" class="file-input-button w-full text-center block bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-500 transition-colors">
            Zoek met foto (Upload of Maak)
        </label>
        <input type="file" id="image-upload-input" class="hidden" accept="image/*" capture="environment">
    </div>
    <div id="image-search-result"></div>

    <hr class="border-gray-700 my-8">

    <div id="app-container" class="space-y-4">
      <!-- De categorieën worden hier dynamisch door JavaScript geladen -->
    </div>
  </div>

  <!-- Modal voor het weergeven van de afbeelding -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="absolute top-4 right-6 text-2xl font-bold text-gray-400 cursor-pointer hover:text-white" onclick="closeModal()">&times;</span>
      <div id="modal-body">
        <!-- Inhoud van de modal wordt dynamisch geladen -->
      </div>
    </div>
  </div>

  <script>
    const appContainer = document.getElementById('app-container');
    const imageModal = document.getElementById('imageModal');
    const modalBody = document.getElementById('modal-body');
    const searchForm = document.getElementById('search-form');
    const searchInput = document.getElementById('part-number-input');
    const searchResultContainer = document.getElementById('search-result');
    const imageUploadInput = document.getElementById('image-upload-input');
    const imageSearchResultContainer = document.getElementById('image-search-result');
    
    const REBRICKABLE_API_KEY = '16904943652c1bc07ef5709e6b6dcbe5';

    // --- Hulpfuncties voor de UI ---

    const showLoading = (container, message) => {
        container.innerHTML = `<div class="flex justify-center items-center p-8"><div class="w-10 h-10 border-4 border-yellow-400 border-dotted rounded-full animate-spin"></div><span class="ml-4 text-gray-400">${message}</span></div>`;
    };

    const showError = (container, message) => {
        container.innerHTML = `<div class="bg-red-900 text-red-300 p-4 rounded-lg text-center">${message}</div>`;
    };
    
    const renderPartResult = (data, container, showClearButton = false) => {
        const { part_img_url, part_url, alternates, name, part_num } = data;
        const alternatesHtml = alternates && alternates.length > 0
            ? `<ul class="list-disc list-inside text-gray-400 mb-4">${alternates.map(alt => `<li>${alt}</li>`).join('')}</ul>`
            : '<p class="text-gray-500 mb-4">Geen alternatieven gevonden.</p>';

        const clearButtonHtml = showClearButton
            ? `<button onclick="document.getElementById('${container.id}').innerHTML = ''; document.getElementById('root').scrollIntoView({ behavior: 'smooth' });" class="mt-6 w-full text-center bg-gray-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-500 transition-colors">Wis resultaat</button>`
            : '';

        container.innerHTML = `
            <div class="bg-gray-700/50 p-6 rounded-lg">
                <h2 class="text-2xl font-bold text-white mb-4 text-left">${name} (${part_num})</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                    <div>
                        <img src="${part_img_url}" alt="Afbeelding van ${name}" class="w-full object-contain rounded-lg shadow-md max-h-64 bg-white/10 p-2">
                    </div>
                    <div class="text-left flex flex-col h-full">
                        <div>
                            <h3 class="text-lg font-bold text-white mb-2">Alternatieve Onderdeelnummers:</h3>
                            ${alternatesHtml}
                        </div>
                        <div class="mt-auto pt-4">
                            <a href="${part_url}" target="_blank" rel="noopener noreferrer" class="w-full text-center inline-block bg-yellow-500 text-gray-900 font-bold py-2 px-4 rounded-lg hover:bg-yellow-400 transition-colors">
                                Bekijk op Rebrickable
                            </a>
                        </div>
                    </div>
                </div>
                ${clearButtonHtml}
            </div>
        `;
    };

    // --- API Functies ---

    const handleRebrickableSearch = async (partNumber, container, showClearButton = false) => {
        showLoading(container, `Onderdeel ${partNumber} zoeken...`);
        try {
            const response = await fetch(`https://rebrickable.com/api/v3/lego/parts/${partNumber}/`, {
                headers: { 'Authorization': `key ${REBRICKABLE_API_KEY}` }
            });
            if (!response.ok) throw new Error(`Onderdeel ${partNumber} niet gevonden in Rebrickable.`);
            const data = await response.json();
            if (!data.part_img_url) throw new Error(`Geen afbeelding gevonden voor ${partNumber}.`);
            renderPartResult(data, container, showClearButton);
        } catch (error) {
            console.error('Rebrickable zoekfout:', error);
            showError(container, error.message);
        }
    };

    // --- Event Listeners ---

    searchForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const partNumber = searchInput.value.trim();
        if (partNumber) {
            handleRebrickableSearch(partNumber, searchResultContainer, true);
        }
    });

    imageUploadInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        showLoading(imageSearchResultContainer, 'Afbeelding analyseren...');

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64ImageData = reader.result.split(',')[1];
            try {
                 const prompt = "Analyseer deze afbeelding van een LEGO-onderdeel. Identificeer het specifieke onderdeel en geef alleen het Rebrickable onderdeelnummer (part_num) terug. Geef geen extra tekst, alleen het nummer.";
                 const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: file.type, data: base64ImageData } }] }] };
                 const apiKey = ""; 
                 const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                 const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                 if (!response.ok) { throw new Error('Fout bij de communicatie met de AI-beeldherkenning.'); }
                 const result = await response.json();
                 const partNumber = result?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

                 if (partNumber && /^\d+$/.test(partNumber)) {
                     handleRebrickableSearch(partNumber, imageSearchResultContainer, true);
                 } else {
                     throw new Error('De AI kon geen geldig onderdeelnummer herkennen in de afbeelding.');
                 }
            } catch (error) {
                console.error('Gemini API fout:', error);
                showError(imageSearchResultContainer, error.message);
            }
        };
        reader.onerror = () => {
             showError(imageSearchResultContainer, 'Fout bij het lezen van het afbeeldingsbestand.');
        };
    });

    function closeModal() {
      imageModal.style.display = 'none';
      modalBody.innerHTML = '';
    }

    const fetchPartImage = async (partNumber, partName) => {
      imageModal.style.display = 'block';
      handleRebrickableSearch(partNumber, modalBody, false);
    };

    // Functie om de categorieën op te halen en te renderen (onveranderd)
    const fetchCategories = async () => {
      appContainer.innerHTML = `<div class="flex justify-center items-center h-48"><div class="w-10 h-10 border-4 border-yellow-400 border-dotted rounded-full animate-spin"></div><span class="ml-4 text-gray-400">Laden...</span></div>`;
      try {
        const legoData = [
          { id: 1, name: 'BASIC', subcategories: [ { id: 101, name: 'Brick', subsections: [ { name: '1× Brick', parts: [ { name: '1×1', number: 3005 }, { name: '1×2', number: 3004 }, { name: '1×3', number: 3622 }, { name: '1×4', number: 3010 }, { name: '1×6', number: 3009 }, { name: '1×8', number: 3008 }, { name: '1×10', number: 6111 }, { name: '1×12', number: 6112 }, { name: '1×16', number: 2465 }, { name: '2×2 Corner', number: 2357 }, ] }, { name: '2× Brick', parts: [ { name: '2×2', number: 3003 }, { name: '2×3', number: 3002 }, { name: '2×4', number: 3001 }, { name: '2×6', number: 2456 }, { name: '2×8', number: 3007 }, { name: '2×10', number: 3006 }, ] }, { name: 'Tall Brick', parts: [ { name: '1×1×3', number: 14716 }, { name: '1×1×5', number: 2453 }, { name: '1×2×2', number: 3245 }, { name: '1×2×3', number: 22886 }, { name: '1×2×5', number: 2454 }, { name: '2×2×3', number: 30145 }, { name: '1×4×3', number: 49311 }, ] }, { name: 'Hollow Brick', parts: [ { name: '1×2 Hollow', number: 3065 }, { name: '1×2×5 Hollow', number: 46212 }, { name: '1×4 Hollow', number: 3066 }, ] }, ] }, { id: 102, name: 'Plate', subsections: [ { name: '1× Plate', parts: [ { name: '1×1', number: 3024 }, { name: '1×2', number: 3023 }, { name: '1×3', number: 3623 }, { name: '1×4', number: 3710 }, { name: '1×5', number: 78329 }, { name: '1×6', number: 3666 }, { name: '1×8', number: 3460 }, { name: '1×10', number: 4477 }, { name: '1×12', number: 60479 }, { name: '2×2 Corner', number: 2420 }, { name: '3×3 Corner', number: 77844 }, { name: '3×3 Cross', number: 15397 }, { name: '2×3 w/ Cutout', number: 73831 }, { name: '4×4 w/ Cutout', number: 64799 }, ] }, { name: '2× Plate', parts: [ { name: '2×2', number: 3022 }, { name: '2×3', number: 3021 }, { name: '2×4', number: 3020 }, { name: '2×6', number: 3795 }, { name: '2×8', number: 3034 }, { name: '2×10', number: 3832 }, { name: '2×12', number: 2445 }, { name: '2×14', number: 91988 }, { name: '2×16', number: 4282 }, { name: '4×4 Corner', number: 26         ];
        
        await new Promise(resolve => setTimeout(resolve, 500));
        renderCategories(legoData);

      } catch (error) {
        appContainer.innerHTML = `<div class="bg-red-900 text-red-300 p-4 rounded-lg text-center">Fout bij het laden van de categorieën.</div>`;
      }
    };

    const renderCategories = (categories) => {
      appContainer.innerHTML = '';
      categories.forEach(category => {
        const categoryItem = document.createElement('div');
        categoryItem.className = 'border-b border-gray-700 py-4 transition-colors duration-200';
        
        const subcategoriesHtml = category.subcategories && category.subcategories.length > 0 ? `
          <ul class="mt-4 space-y-2 pl-4 border-l border-gray-600 ml-2 hidden" data-id="${category.id}">
            ${category.subcategories.map((sub, subIndex) => `
              <li class="text-gray-300 text-lg transition-colors duration-200 hover:text-gray-100">
                <button class="flex justify-between items-center w-full text-left focus:outline-none" data-sub-id="${category.id}-${subIndex}">
                  <span class="font-bold text-gray-100">${sub.name}</span>
                  ${sub.subsections ? `<svg class="text-gray-400 transform transition-transform duration-200 flex-shrink-0" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>` : ''}
                </button>
                <div class="mt-2 space-y-1 pl-4 hidden" data-sub-id="${category.id}-${subIndex}">
                  ${sub.subsections ? sub.subsections.map((section, sectionIndex) => `
                    <div class="space-y-1">
                      <button class="flex justify-between items-center w-full text-left focus:outline-none" data-section-id="${category.id}-${subIndex}-${sectionIndex}">
                        <h4 class="font-semibold text-gray-200">${section.name}</h4>
                        <svg class="text-gray-400 transform transition-transform duration-200 flex-shrink-0" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                      </button>
                      <ul class="ml-4 space-y-1 hidden" data-section-id="${category.id}-${subIndex}-${sectionIndex}">
                        ${section.parts.map(part => `<li class="text-gray-400 text-sm cursor-pointer hover:text-yellow-400" onclick="fetchPartImage('${part.number}', '${part.name.replace(/'/g, "\\'")}')">${part.name} (Onderdeelnummer: ${part.number})</li>`).join('')}
                      </ul>
                    </div>
                  `).join('') : ''}
                </div>
              </li>
            `).join('')}
          </ul>
        ` : '';

        categoryItem.innerHTML = `
          <button class="flex justify-between items-center w-full text-left focus:outline-none" data-id="${category.id}">
            <span class="text-xl font-bold text-gray-100">${category.name}</span>
            ${category.subcategories && category.subcategories.length > 0 ? `<svg class="text-gray-400 transform transition-transform duration-200 flex-shrink-0" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>` : ''}
          </button>
          ${subcategoriesHtml}
        `;
        
        appContainer.appendChild(categoryItem);
      });

      appContainer.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;
        const id = button.dataset.id || button.dataset.subId || button.dataset.sectionId;
        if (!id) return;
        const list = appContainer.querySelector(`ul[data-id="${id}"], div[data-sub-id="${id}"], ul[data-section-id="${id}"]`);
        const icon = button.querySelector('svg');
        if (list) {
          list.classList.toggle('hidden');
          if (icon) icon.classList.toggle('rotate-180');
        }
      });
    };

    fetchCategories();
  </script>
</body>
</html>
